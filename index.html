<!DOCTYPE html>
<html>
<head>
<title>VoidSteal SMP</title>

<style>
*{
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    margin:0;
    background:#0b0b0b;
    color:white;
}

nav{
    background:#111;
    padding:20px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:15px;
    font-weight:bold;
}

.hero{
    height:450px;
    background:
    linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.8)),
    url("background.jpg");
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1{
    font-size:65px;
    color:#00ff88;
    text-shadow:0 0 15px black;
}

.hero p{
    font-size:22px;
}

.ip{
    background:#181818;
    padding:18px;
    border-radius:8px;
    margin:20px auto;
    width:300px;
    font-size:22px;
}

button{
    background:#00ff88;
    border:0;
    padding:15px 35px;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

.section{
    padding:40px;
    text-align:center;
}

.card{
    display:inline-block;
    background:#171717;
    padding:25px;
    margin:10px;
    width:200px;
    border-radius:10px;
}

.stat{
    font-size:25px;
    color:#00ff88;
}

</style>
</head>

<body>

<nav>
<a href="#">Home</a>
<a href="#">Server</a>
<a href="#">Rules</a>
<a href="#">Discord</a>
</nav>


<div class="hero">

<div>
<h1>⚔ VOIDSTEAL SMP ⚔</h1>

<p>The ultimate Lifesteal experience</p>

<div class="ip">
play.voidsteal.com
</div>

<button>JOIN NOW</button>

</div>

</div>


<div class="section">

<h2>Server Status</h2>

<div class="card">
<div class="stat">ONLINE</div>
Status
</div>

<div class="card">
<div class="stat">1.21</div>
Version
</div>

<div class="card">
<div class="stat">0/100</div>
Players
</div>

</div>


<div class="section">

<h2>Game Modes</h2>

<div class="card">❤️ Lifesteal</div>
<div class="card">⚔ PvP</div>
<div class="card">🌎 Survival</div>
<div class="card">🔥 Events</div>

</div>


<div class="section">
<h2>Join Our Community</h2>
<button>Discord</button>
</div>

</body>
</html>
